# ============================================================
#  LlaMA.C++ config – MSI Release Workflow (pre-built binary)
#
#  Triggers on any tag push matching v* (e.g. v1.2.3)
#  Can also be run manually via workflow_dispatch.
#
#  What it does:
#    1. Determine version
#    2. Installs WiX 3.11 via Chocolatey
#    3. Syncs installer/version.txt with the tag, commits it back
#    4. Builds per-machine AND per-user MSIs via build.ps1
#    5. Optionally signs both MSIs (set SIGN_MSI=true + cert secrets)
#    6. Creates a GitHub Release and uploads both MSIs as assets
#
#  Required secrets (Settings → Secrets → Actions):
#    RELEASE_TOKEN        – fine-grained PAT with Contents: write
#
#  Optional signing secrets:
#    CODESIGN_CERT_BASE64 – PFX certificate encoded as base64
#    CODESIGN_CERT_PASS   – PFX password
#    CODESIGN_THUMBPRINT  – SHA-1 thumbprint of the signing cert
#
#  env vars you may want to tweak:
#    SIGN_MSI             – set to 'true' to enable signtool signing
# ============================================================

name: Build & Release MSI
on:
  workflow_dispatch: # Enable manual triggering
  push:
    tags:
      - "b*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  SIGN_MSI:          "false"      # flip to 'true' + add cert secrets to sign

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────────────
  #  JOB 1 – build MSIs
  # ──────────────────────────────────────────────────────────
  build-msi:
    name: Build MSI packages
    runs-on: windows-latest

    outputs:
      version:       ${{ steps.get-version.outputs.version }}
      short-version: ${{ steps.get-version.outputs.short-version }}
      build-number:  ${{ steps.get-version.outputs.build-number }}

    steps:
      # ── 1. Checkout installer project ────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      # ── 2. Resolve tag + derive version numbers ───────────
      #       Tag v1.2.3  →  version: 1.2.3.0 | short: 1.2.3
      - name: Derive version from tag
        id: get-version
        shell: pwsh
        run: |
          # Prefer the push-event tag; fall back to version.txt
          $vFile   = Join-Path "${{ github.workspace }}" "installer" "version.txt" 
          $rawTag = if (("${{ github.ref_name }}" -ne "") -and ("${{ github.ref }}" -like "refs/tags/*")) {
                      "${{ github.ref_name }}"
                    } elseif (Test-Path $vFile) {
                      (Get-Content $vFile -Raw).Trim()
                    } else { "b0" }

          $num   = $rawTag.TrimStart('b')
          $full  = "0.0.{0}.0" -f $num
          $short = "0.0.{0}" -f $num

          Write-Host "Tag      : $rawTag"
          Write-Host "Build no : $num"
          Write-Host "Short ver: $short"

          "version=$rawTag"         | Out-File $env:GITHUB_OUTPUT -Append
          "build-number=$num"       | Out-File $env:GITHUB_OUTPUT -Append
          "short-version=$short"    | Out-File $env:GITHUB_OUTPUT -Append
          "full-version=$full"     | Out-File $env:GITHUB_OUTPUT -Append

          # Keep version.txt in sync (build.ps1 reads it as fallback)
          Set-Content -Path installer/version.txt -Value $rawTag -NoNewline

      # ── 3. Install dotnet ───────────────────────
      - name: Install dotnet
        shell: pwsh
        run: |
            choco install dotnet-sdk --version 9.0.314 --yes --no-progress

      # ── 4. Install WiX Toolset and Accept Eula ───────────────────────
      - name: Install wix
        run: |
            dotnet tool install --global wix --version 5.0.2
            wix extension add -g WixToolset.Util.wixext/5.0.2
            wix extension add -g WixToolset.UI.wixext/5.0.2
            
      # ── 5. Download pre-built EXE ──────────────────────────
      - name: Download LlamaCpp
        shell: pwsh
        run: |
          $version  = "${{ steps.get-version.outputs.version }}"
          $stagingDir  = "${{ github.workspace }}\staging"
          $SourceDir  = "${{ github.workspace }}\llamacpp-bin"
          
          
          $flavors = @("cpu", "vulkan", "sycl", "hip-radeon", "cuda-12.4", "cuda-13.3")
          $cudarts = @("cuda-12.4", "cuda-13.3")
          
          foreach ($flavor in $flavors) {
            if (-not ($flavor -is [string])) {
              Write-Warning "Skipping non-string flavor: $flavor"
              continue
              }
            $zipFileName     = "llama-{0}-bin-win-{1}-x64.zip" -f $version, $flavor
            $downloadUrl  = "https://github.com/ggml-org/llama.cpp/releases/download/{0}/{1}" -f $version, $zipFileName
            $OutputDir   = Join-Path $SourceDir $flavor			
                             
            # Ensure staging directory exists  (clean if exists)
            if (Test-Path $stagingDir) { Remove-Item $stagingDir -Recurse -Force }
            New-Item -Path $stagingDir -ItemType Directory -Force | Out-Null
             
            # Download ZIP
            $zipFilePath = Join-Path $stagingDir $zipFileName
            
            Write-Host "Downloading ZIP from $downloadUrl ..."
            Invoke-WebRequest -Uri $downloadURL -OutFile $zipFilePath -UseBasicParsing
            
            if (-not (Test-Path $zipFilePath)) {
              Write-Host  "Download failed. $downloadUrl not found."
            }
            
            $size = (Get-Item $zipFilePath).Length
            Write-Host "Downloaded: $([math]::Round($size/1KB, 1)) KB"
            
            # Ensure target extract folder exists (clean if exists)
            if (Test-Path $OutputDir) { Remove-Item $OutputDir -Recurse -Force }
            New-Item -Path $OutputDir -ItemType Directory -Force | Out-Null
          
            # Extract entire ZIP
            Write-Host "Extracting ZIP to target folder..."
            Expand-Archive -Path $zipFilePath -DestinationPath $OutputDir -Force
            
            Write-Output "Extracted $downloadUrl to $OutputDir"
            
            Write-Host "Clean-up staging folder..."
            Remove-Item $stagingDir -Recurse -Force
          
          }
          
          foreach($cuda in $cudarts) {
            $zipFileName       = "cudart-llama-bin-win-{0}-x64.zip" -f $cuda
            $downloadUrl    = "https://github.com/ggml-org/llama.cpp/releases/download/{0}/{1}" -f$version, $zipFileName # URL of the ZIP file
            $OutputDir   = Join-Path $SourceDir $cuda
                        
            # Ensure staging directory exists  (clean if exists)
            if (Test-Path $stagingDir) { Remove-Item $stagingDir -Recurse -Force }
            New-Item -Path $stagingDir -ItemType Directory -Force | Out-Null
             
            # Download ZIP
            $zipFilePath = Join-Path $stagingDir $zipFileName
            
            Write-Host "Downloading ZIP from $downloadUrl ..."
            Invoke-WebRequest -Uri $downloadURL -OutFile $zipFilePath -UseBasicParsing
            
            # Extract entire ZIP
            Write-Host "Extracting ZIP to target folder..."
            Expand-Archive -Path $zipFilePath -DestinationPath $OutputDir -Force
            
            
            Write-Output "Extracted $downloadUrl to $OutputDir"
          }
          
      # ── 4. Build per-machine MSI ──────────────────────────
      - name: Build per-machine MSI
        shell: pwsh
        run: |
           $ShortVer  = "${{ steps.get-version.outputs.short-version }}"
           $SemVersion  = "${{ steps.get-version.outputs.full-version }}"
           $ProductVersion  = "${{ steps.get-version.outputs.version }}"
           $SourceRoot  = "${{ github.workspace }}\llamacpp-bin"
           $OutputRoot  = "${{ github.workspace }}\msi-output\machine"
           $ProductWxs  = "${{ github.workspace }}\installer\Product.wxs"
           $IconDir  = "${{ github.workspace }}\installer\icons"
           $ConfigDir  = "${{ github.workspace }}\installer\config"
           $BitmapDir  = "${{ github.workspace }}\installer\bitmaps"
           $LicenseFile  = "${{ github.workspace }}\installer\License.rtf"
           
           $flavors = @("cpu", "vulkan", "sycl", "hip-radeon", "cuda-12.4", "cuda-13.3") 
           foreach($flavor in $flavors) {
             $SourceDir = Join-Path $SourceRoot $flavor
             $OutputDir = Join-Path $OutputDir $flavor
             $Outfile  = "llamacpp-superuser-{0}.msi" -f $ProductVersion
             $OutputMsi = Join-Path $OutputDir  $Outfile
             $BuildType = "Machine"
             $Scope = "perMachine"
             # Ensure staging directory exists  (clean if exists)
             if (Test-Path $OutputDir) { Remove-Item $OutputDir -Recurse -Force }
             New-Item -Path $OutputDir -ItemType Directory -Force | Out-Null
           
             # Clean intermediate directory
             $BuildDir = Join-Path $OutputDir "build"
             if (Test-Path $BuildDir) { Remove-Item $BuildDir -Recurse -Force }
             New-Item -Path $BuildDir -ItemType Directory -Force | Out-Null
           
             Write-Host "Building  $OutputMsi"
             wix build -arch "x64" -outputtype "Package" -culture "en-US" -b $SourceDir -out $OutputMsi `
              -intermediatefolder $BuildDir -src $ProductWxs -ext WixToolset.Util.wixext -ext WixToolset.UI.wixext `
              -d BuildType=$BuildType -d ProductVersion=$ProductVersion -d ShortVer=$ShortVer -d SemVersion=$SemVersion `
              -d Scope=$Scope -d SourceRoot=$SourceRoot -d SourceDir=$SourceDir `
              -d IconDir=$IconDir -d ConfigDir=$ConfigDir -d BitmapDir=$BitmapDir -d LicenseFile=$LicenseFile
           
             Write-Host "[ok]  Completed   $OutputMsi"
             
           }

      # ── 5. Build per-user MSI ─────────────────────────────
      - name: Build per-user MSI
        shell: pwsh
        run: |
           $ShortVer  = "${{ steps.get-version.outputs.short-version }}"
           $SemVersion  = "${{ steps.get-version.outputs.full-version }}"
           $ProductVersion  = "${{ steps.get-version.outputs.version }}"
           $SourceRoot  = "${{ github.workspace }}\llamacpp-bin"
           $OutputRoot  = "${{ github.workspace }}\msi-output\user"
           $ProductWxs  = "${{ github.workspace }}\installer\Product.wxs"
           $IconDir  = "${{ github.workspace }}\installer\icons"
           $ConfigDir  = "${{ github.workspace }}\installer\config"
           $BitmapDir  = "${{ github.workspace }}\installer\bitmaps"
           $LicenseFile  = "${{ github.workspace }}\installer\License.rtf"
           
           $flavors = @("cpu", "vulkan", "sycl", "hip-radeon", "cuda-12.4", "cuda-13.3") 
           foreach($flavor in $flavors) {
             $SourceDir = Join-Path $SourceRoot $flavor
             $OutputDir = Join-Path $OutputDir $flavor
             $Outfile  = "llamacpp-enduser-{0}.msi" -f $ProductVersion
             $OutputMsi = Join-Path $OutputDir  $Outfile
             $BuildType = "User"
             $Scope = "perUser"
             # Ensure staging directory exists  (clean if exists)
             if (Test-Path $OutputDir) { Remove-Item $OutputDir -Recurse -Force }
             New-Item -Path $OutputDir -ItemType Directory -Force | Out-Null
           
             # Clean intermediate directory
             $BuildDir = Join-Path $OutputDir "build"
             if (Test-Path $BuildDir) { Remove-Item $BuildDir -Recurse -Force }
             New-Item -Path $BuildDir -ItemType Directory -Force | Out-Null
           
             Write-Host "Building  $OutputMsi"
             wix build -arch "x64" -outputtype "Package" -culture "en-US" -b $SourceDir -out $OutputMsi `
              -intermediatefolder $BuildDir -src $ProductWxs -ext WixToolset.Util.wixext -ext WixToolset.UI.wixext `
              -d BuildType=$BuildType -d ProductVersion=$ProductVersion -d ShortVer=$ShortVer -d SemVersion=$SemVersion `
              -d Scope=$Scope -d SourceRoot=$SourceRoot -d SourceDir=$SourceDir `
              -d IconDir=$IconDir -d ConfigDir=$ConfigDir -d BitmapDir=$BitmapDir -d LicenseFile=$LicenseFile
           
             Write-Host "[ok]  Completed   $OutputMsi"
             
           }


      # ── 6. List build output ──────────────────────────────
      - name: List MSI output
        shell: pwsh
        run: Get-ChildItem "${{ github.workspace }}\msi-output" | Format-Table Name, Length

      # ── 7. (Optional) Import signing certificate ─────────
      - name: Import code-signing certificate
        if: env.SIGN_MSI == 'true'
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.CODESIGN_CERT_BASE64 }}")
          $pfx   = "$env:RUNNER_TEMP\codesign.pfx"
          [IO.File]::WriteAllBytes($pfx, $bytes)
          Import-PfxCertificate -FilePath $pfx `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString "${{ secrets.CODESIGN_CERT_PASS }}" `
                       -AsPlainText -Force) | Out-Null
          Remove-Item $pfx -Force
          Write-Host "Certificate imported."

      # ── 8. (Optional) Sign both MSIs ─────────────────────
      - name: Sign MSIs
        if: env.SIGN_MSI == 'true'
        shell: pwsh
        run: |
          $ver  = "${{ steps.get-version.outputs.version }}"
          $msis = @(
            "${{ github.workspace }}\msi-output\llamacpp-superuser-cpu-$ver.msi",
            "${{ github.workspace }}\msi-output\llamacpp-superuser-vulkan-$ver.msi",
            "${{ github.workspace }}\msi-output\llamacpp-superuser-sycl-$ver.msi",
            "${{ github.workspace }}\msi-output\llamacpp-superuser-hip-radeon-$ver.msi",
            "${{ github.workspace }}\msi-output\llamacpp-superuser-cuda-12.4-$ver.msi",
            "${{ github.workspace }}\msi-output\llamacpp-superuser-cuda-13.3-$ver.msi",
            "${{ github.workspace }}\msi-output\llamacpp-enduser-cpu-$ver.msi",
            "${{ github.workspace }}\msi-output\llamacpp-enduser-vulkan-$ver.msi",
            "${{ github.workspace }}\msi-output\llamacpp-enduser-sycl-$ver.msi",
            "${{ github.workspace }}\msi-output\llamacpp-enduser-hip-radeon-$ver.msi",
            "${{ github.workspace }}\msi-output\llamacpp-enduser-cuda-12.4-$ver.msi",
            "${{ github.workspace }}\msi-output\llamacpp-enduser-cuda-13.3-$ver.msi"
          )
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match 'x64' } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          foreach ($msi in $msis) {
            Write-Host "Signing: $msi"
            & $signtool sign /fd SHA256 `
              /sha1 "${{ secrets.CODESIGN_THUMBPRINT }}" `
              /tr http://timestamp.digicert.com /td SHA256 $msi
            if ($LASTEXITCODE -ne 0) { throw "Signing failed for $msi" }
          }

      # ── 9. Commit updated version.txt back to main ───────
      - name: Commit version.txt
        shell: pwsh
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          $full = "${{ steps.get-version.outputs.version }}"
          Set-Content -Path installer/version.txt -Value $full -NoNewline
          git add installer/version.txt

          $dirty = git status --porcelain
          if ($dirty) {
            git commit -m "chore: sync version.txt to $full [skip ci]"
            git push origin HEAD:${{ github.event.repository.default_branch }}
            Write-Host "Committed version.txt → $full"
          } else {
            Write-Host "version.txt already at $full – nothing to commit."
          }

      # ── 10. Upload MSIs as workflow artifacts ─────────────
      - name: Upload MSI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: msi-packages
          path: msi-output/
          if-no-files-found: error
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  #  JOB 2 – Create GitHub Release & attach MSIs
  # ──────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-msi

    steps:
      # ── 1. Checkout for git log ───────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # ── 2. Download MSIs from Job 1 ───────────────────────    
      - name: Download MSI artifacts
        uses: actions/download-artifact@v4
        with:
          name: msi-packages
          path: msi-output/
          merge-multiple: true
          repository: ${{ github.repository }}
          run-id: ${{ github.run_id }}
          
      - name: List downloaded files
        run: find "$(pwd)" -type f -name "*.msi"

      # ── 3. Auto-generate release notes from git log ───────
      - name: Generate release notes
        run: |
          VERSION="${{ needs.build-msi.outputs.short-version }}"
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --oneline "${PREV_TAG}".."${TAG}" \
              --no-merges --pretty=format:"- %s (%h)" | head -50)
          else
            CHANGES="_Initial release._"
          fi

          cat <<EOF > release_notes.md
          ## LlaMA.C++ ${VERSION}

          ### Downloads
          | Package | Scope |
          |---------|-------|
          | \`llamacpp-superuser-${Flavor}-${VERSION}.msi\` | Per-machine – installs to \`Program Files\`, requires admin / UAC |
          | \`llamacpp-enduser-${Flavor}-${VERSION}.msi\` | Per-user – installs to \`LocalAppData\`, no UAC needed |

          ### Install

          **Silent / unattended (per-machine):**
          \`\`\`
          msiexec /i llamacpp-superuser-${Flavor}-${VERSION}.msi /qn
          \`\`\`
          **Silent / unattended (per-user):**
          \`\`\`
          msiexec /i llamacpp-enduser-${Flavor}-${VERSION}-peruser.msi /qn
          \`\`\`
          **Interactive:** double-click either MSI and follow the wizard.

          ### Upgrade / downgrade
          - Installing a **newer version** automatically removes the old one.
          - Installing an **older version** over a newer one is blocked with an error.

          ### What changed since ${PREV_TAG:-"the beginning"}
          ${CHANGES}

          ---
          *Built from tag \`${TAG}\` · GitHub Actions · $(date -u +"%Y-%m-%d %H:%M UTC")*
          EOF

      # ── 4. Publish release + upload MSIs ──────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.ref_name }}
          name:       "LlaMA.C++ ${{ needs.build-msi.outputs.version }}"
          body_path:  release_notes.md
          draft:      false
          # Tags with a hyphen (v1.0.0-rc1, v2.0.0-beta) become pre-releases
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: msi-output/**/*.msi
          token: ${{ secrets.RELEASE_TOKEN }}
          fail_on_unmatched_files: true